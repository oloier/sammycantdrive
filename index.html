<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>sammy can't drive...</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }
    img {
      position: relative;
      z-index: 1000;
      max-width: 90vw;
      max-height: 90vh;
      cursor: pointer;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #000; }
    }
  </style>
</head>

<!-- To whoever originally did this site, I love you. This is for you. -->

<body>
  <audio id="audio" autoplay>
    <source src="scd55.webm" type="audio/webm">
    <source src="scd55.mp3" type="audio/mpeg">
  </audio>
  <img id="img" src="scd55.jpg" alt="Sammy can't drive">

  <script>
    const audio = document.getElementById('audio');
    const img = document.getElementById('img');
    let state = 'idle'; // idle | playing | celebrating
    let celebCanvas, spawnTimer, endTimer, audioCopies = [];
    let viewport = { width: 0, height: 0 };
    let stampedTiles = [];
    let resizeCelebrationCanvas = null;

    img.addEventListener('click', () => {
      if (state === 'celebrating') { stopCelebration(); return; }
      if (state === 'playing') return;
      state = 'playing';
      audio.currentTime = 0;
      audio.play();
      audio.addEventListener('ended', startCelebration, { once: true });
    });

    function startCelebration() {
      state = 'celebrating';

      celebCanvas = document.createElement('canvas');
      celebCanvas.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:999';
      document.body.appendChild(celebCanvas);
      const ctx = celebCanvas.getContext('2d');
      let spawnCount = 0;

      function syncCanvasSize() {
        viewport.width = window.innerWidth;
        viewport.height = window.innerHeight;
        celebCanvas.width = viewport.width;
        celebCanvas.height = viewport.height;
        celebCanvas.style.width = `${viewport.width}px`;
        celebCanvas.style.height = `${viewport.height}px`;
      }

      function redrawTiles() {
        ctx.clearRect(0, 0, celebCanvas.width, celebCanvas.height);
        stampedTiles.forEach(tile => {
          const tileW = viewport.width * tile.widthRatio;
          const tileH = tileW * tile.aspectRatio;
          const x = viewport.width * tile.xRatio;
          const y = viewport.height * tile.yRatio;
          ctx.save();
          ctx.globalAlpha = tile.alpha;
          ctx.translate(x + tileW / 2, y + tileH / 2);
          ctx.drawImage(img, -tileW / 2, -tileH / 2, tileW, tileH);
          ctx.restore();
        });
      }

      resizeCelebrationCanvas = () => {
        syncCanvasSize();
        redrawTiles();
      };
      window.addEventListener('resize', resizeCelebrationCanvas);
      resizeCelebrationCanvas();

      function spawnTile() {
        const widthRatio = 0.1 + Math.random() * 0.5;
        const aspectRatio = img.naturalHeight / img.naturalWidth;
        const tileW = viewport.width * widthRatio;
        const tileH = tileW * aspectRatio;
        const x = Math.random() * (viewport.width + tileW * 0.4) - tileW * 0.2;
        const y = Math.random() * (viewport.height + tileH * 0.4) - tileH * 0.2;
        const alpha = 0.75 + Math.random() * 0.25;
        stampedTiles.push({
          alpha,
          aspectRatio,
          widthRatio,
          xRatio: x / viewport.width,
          yRatio: y / viewport.height
        });
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(x + tileW / 2, y + tileH / 2);
        ctx.drawImage(img, -tileW / 2, -tileH / 2, tileW, tileH);
        ctx.restore();

        playBlip();

        spawnCount++;
        const delay = Math.max(60, 700 - spawnCount * 18);
        spawnTimer = setTimeout(spawnTile, delay);
      }

      spawnTile();
      endTimer = setTimeout(softStop, 20000);
    }

    function playBlip() {
      const a = new Audio();
      const s1 = document.createElement('source');
      s1.src = 'scd55.webm'; s1.type = 'audio/webm';
      const s2 = document.createElement('source');
      s2.src = 'scd55.mp3'; s2.type = 'audio/mpeg';
      a.appendChild(s1); a.appendChild(s2);
      a.currentTime = Math.random() * 3;
      a.volume = 0.35 + Math.random() * 0.65;
      a.playbackRate = 0.7 + Math.random() * 1.6;
      a.play().catch(() => {});
      audioCopies.push(a);
      a.addEventListener('ended', () => { audioCopies = audioCopies.filter(x => x !== a); });
    }

    function softStop() {
      clearTimeout(spawnTimer);
      clearTimeout(endTimer);
      window.removeEventListener('resize', resizeCelebrationCanvas);
      resizeCelebrationCanvas = null;
      stampedTiles = [];
      // let playing blips finish naturally, then clean up
      const drain = () => {
        if (audioCopies.length === 0) { celebCanvas?.remove(); state = 'idle'; return; }
        setTimeout(drain, 300);
      };
      drain();
    }

    function stopCelebration() {
      clearTimeout(spawnTimer);
      clearTimeout(endTimer);
      window.removeEventListener('resize', resizeCelebrationCanvas);
      resizeCelebrationCanvas = null;
      celebCanvas?.remove();
      audioCopies.forEach(a => a.pause());
      audioCopies = [];
      stampedTiles = [];
      state = 'idle';
    }
  </script>
</body>
</html>
