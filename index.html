<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>sammy can't drive...</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }
    img {
      max-width: 90vw;
      max-height: 90vh;
      cursor: pointer;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #000; }
    }
  </style>
</head>

<!-- To whoever originally did this site, I love you. This is for you. -->

<body>
  <audio id="audio" autoplay>
    <source src="scd55.webm" type="audio/webm">
    <source src="scd55.mp3" type="audio/mpeg">
  </audio>
  <img id="img" src="scd55.jpg" alt="Sammy can't drive">

  <script>
    const audio = document.getElementById('audio');
    const img = document.getElementById('img');
    let glitching = false;
    let audioCtx, sourceNode, distortion, filter;

    function makeDistortionCurve(amount) {
      const n = 256, curve = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        const x = (i * 2) / n - 1;
        curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
      }
      return curve;
    }

    function setupAudio() {
      if (audioCtx) return;
      audioCtx = new AudioContext();
      sourceNode = audioCtx.createMediaElementSource(audio);
      distortion = audioCtx.createWaveShaper();
      filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 350;
      sourceNode.connect(distortion);
      distortion.connect(filter);
      filter.connect(audioCtx.destination);
    }

    img.addEventListener('click', () => {
      if (glitching) return;
      glitching = true;
      setupAudio();

      audioCtx.resume().then(() => {
        audio.currentTime = 0;
        audio.play();
      });

      // audio chaos: set distortion once (swapping curve mid-playback clicks),
      // then sweep filter + pitch continuously
      distortion.curve = makeDistortionCurve(500);
      const audioInterval = setInterval(() => {
        audio.playbackRate = 0.5 + Math.random() * 2.2;
        filter.frequency.setTargetAtTime(100 + Math.random() * 6000, audioCtx.currentTime, 0.05);
        filter.Q.setTargetAtTime(0.5 + Math.random() * 20, audioCtx.currentTime, 0.05);
      }, 110);

      // canvas chaos
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      let animFrame;

      function glitchFrame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const copies = 3 + Math.floor(Math.random() * 7);
        for (let c = 0; c < copies; c++) {
          const scale = 0.15 + Math.random() * 2.2;
          const w = img.width * scale;
          const h = img.height * scale;
          const x = Math.random() * canvas.width - w / 2;
          const y = Math.random() * canvas.height - h / 2;

          ctx.globalAlpha = 0.15 + Math.random() * 0.85;
          ctx.filter = `hue-rotate(${Math.random() * 360}deg) saturate(${1 + Math.random() * 8}) brightness(${0.4 + Math.random() * 2})`;
          ctx.drawImage(img, x, y, w, h);

          // horizontal glitch strips
          const strips = Math.floor(Math.random() * 12);
          for (let s = 0; s < strips; s++) {
            const sy = Math.floor(Math.random() * img.naturalHeight);
            const sh = Math.floor(1 + Math.random() * 40);
            const dx = (Math.random() - 0.5) * 140;
            ctx.drawImage(img, 0, sy, img.naturalWidth, sh,
              x + dx, y + (sy / img.naturalHeight) * h,
              w, (sh / img.naturalHeight) * h);
          }
        }

        ctx.globalAlpha = 1;
        ctx.filter = 'none';
        animFrame = requestAnimationFrame(glitchFrame);
      }

      glitchFrame();

      let cleaned = false;
      function cleanup() {
        if (cleaned) return;
        cleaned = true;
        cancelAnimationFrame(animFrame);
        clearInterval(audioInterval);
        canvas.remove();
        audio.playbackRate = 1;
        distortion.curve = null;
        filter.frequency.value = 350;
        glitching = false;
      }

      audio.addEventListener('ended', cleanup, { once: true });
      setTimeout(cleanup, 10000); // safety net
    });
  </script>
</body>
</html>
