<!-- To whoever originally did this site, I love you. This is for you. -->

<body>
  <audio id="audio" autoplay>
    <source src="scd55.webm" type="audio/webm">
    <source src="scd55.mp3" type="audio/mpeg">
  </audio>
  <img id="img" src="scd55.jpg" alt="Sammy can't drive" width="135" height="104">

  <script>
    const audio = document.getElementById('audio');
    const img = document.getElementById('img');
    let state = 'idle'; // idle | playing | celebrating
    let celebCanvas, spawnTimer, endTimer, audioCopies = [];

    img.addEventListener('click', () => {
      if (state === 'celebrating') { stopCelebration(); return; }
      if (state === 'playing') return;
      state = 'playing';
      audio.currentTime = 0;
      audio.play();
      audio.addEventListener('ended', startCelebration, { once: true });
    });

    function startCelebration() {
      state = 'celebrating';

      celebCanvas = document.createElement('canvas');
      celebCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999';
      celebCanvas.width = window.innerWidth;
      celebCanvas.height = window.innerHeight;
      document.body.appendChild(celebCanvas);
      const ctx = celebCanvas.getContext('2d');
 
      const W = celebCanvas.width, H = celebCanvas.height;
      let spawnCount = 0;

      function spawnTile() {
        const tileW = W * (0.1 + Math.random() * 0.5);
        const tileH = tileW * (img.naturalHeight / img.naturalWidth);
        const x = Math.random() * (W + tileW * 0.4) - tileW * 0.2;
        const y = Math.random() * (H + tileH * 0.4) - tileH * 0.2;
        ctx.save();
        ctx.globalAlpha = 0.75 + Math.random() * 0.25;
        ctx.translate(x + tileW / 2, y + tileH / 2);
        ctx.drawImage(img, -tileW / 2, -tileH / 2, tileW, tileH);
        ctx.restore();

        playBlip();

        spawnCount++;
        const delay = Math.max(60, 700 - spawnCount * 18);
        spawnTimer = setTimeout(spawnTile, delay);
      }

      spawnTile();
      endTimer = setTimeout(softStop, 20000);
    }

    function playBlip() {
      const a = new Audio();
      const s1 = document.createElement('source');
      s1.src = 'scd55.webm'; s1.type = 'audio/webm';
      const s2 = document.createElement('source');
      s2.src = 'scd55.mp3'; s2.type = 'audio/mpeg';
      a.appendChild(s1); a.appendChild(s2);
      a.currentTime = Math.random() * 3;
      a.volume = 0.35 + Math.random() * 0.65;
      a.playbackRate = 0.7 + Math.random() * 1.6;
      a.play().catch(() => {});
      audioCopies.push(a);
      a.addEventListener('ended', () => { audioCopies = audioCopies.filter(x => x !== a); });
    }

    function softStop() {
      clearTimeout(spawnTimer);
      clearTimeout(endTimer);
      // let playing blips finish naturally, then clean up
      const drain = () => {
        if (audioCopies.length === 0) { celebCanvas?.remove(); state = 'idle'; return; }
        setTimeout(drain, 300);
      };
      drain();
    }

    function stopCelebration() {
      clearTimeout(spawnTimer);
      clearTimeout(endTimer);
      celebCanvas?.remove();
      audioCopies.forEach(a => a.pause());
      audioCopies = [];
      state = 'idle';
    }
  </script>
</body>
